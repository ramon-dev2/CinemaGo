name: .NET CI

on:

  push:

    branches:

      - main

      - Develop

      - abdieldev

      - 'feature/**'

      - '**/*dev'

  pull_request:

    branches: [ main, Develop, abdieldev ]

env:

  DOTNET_VERSION: '10.0.x'

  SOLUTION: CinemaGo.sln

  CONFIGURATION: Release

jobs:

  build:

    name: Build & verify

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}

        uses: actions/setup-dotnet@v4

        with:

          dotnet-version: ${{ env.DOTNET_VERSION }}

          cache: false

      - name: Restore

        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build

        run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore --nologo

      - name: Test

        run: dotnet test ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-build --no-restore --nologo --verbosity normal

        continue-on-error: true

        # Cuando agregues proyectos de test, quita continue-on-error.

      - name: Format check

        run: dotnet format ${{ env.SOLUTION }} --verify-no-changes --no-restore

        continue-on-error: true

        # Soft check: no falla el pipeline, solo avisa en el log.

      - name: Upload build artifacts

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: build-output

          path: |

            **/bin/Release/net10.0/*.dll

            **/bin/Release/net10.0/*.pdb

          retention-days: 7

          if-no-files-found: ignore
